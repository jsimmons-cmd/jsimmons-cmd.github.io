<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARASAKA | サ イ バ ー チ ャ ッ ト</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="container">
        <header>
            <h1 class="glitch" data-text="ARASAKA">ARASAKA</h1>
            <p class="subtitle">コーポレート・メッセージング・プラットフォーム</p>
        </header>
        <div id="chat-box">
            <!-- Messages will be dynamically inserted here -->
        </div>
        <div id="input-area">
            <input type="text" id="message-input" placeholder="Enter your message...">
            <button id="send-button">送信</button>
        </div>
    </div>

    <!-- Firebase SDK Scripts -->
    <!-- Make sure the version numbers here match what Firebase gives you -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <!-- Your Script File -->
    <script src="script.js"></script>
</body>
</html>
